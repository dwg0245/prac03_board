server:
  port: 8082

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10     # 주소를 갱신하는 시간
    lease-expiration-duration-in-seconds: 30  # 가져온 주소의 만료 시간
    prefer-ip-address: true                   # 내 주소를 알려줄 때 Hostname 대신 IP 주소 알려주기
  client:
    service-url:
      defaultZone: http://localhost:9090/eureka
    register-with-eureka: false # 현재 자신의 IP주소를 유레카에 등록
    fetch-registry: true        # 유레카에 등록된 주소들을 받아오는 것


spring:
  application:
    name: board-query

  datasource:
    river-class-name: org.mariadb.jdbc.Driver
    url: ${QUERY_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: 192.168.23.10:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.LongDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: board-group-1 # 코든 컨슈머에 적용되는 기본값
      # DTO로 받을때 추가 설정
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false # 프로듀서가 보낸 타입(패키지 포함)을 무시하도록 설정

logging:
  level:
    org.example.board_query: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace