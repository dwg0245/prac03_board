server:
  port: 8082

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10     # 주소를 갱신하는 시간
    lease-expiration-duration-in-seconds: 30  # 가져온 주소의 만료 시간
    prefer-ip-address: true                   # 내 주소를 알려줄 때 Hostname 대신 IP 주소 알려주기
  client:
    service-url:
      defaultZone: http://localhost:9090/eureka
    register-with-eureka: false # 현재 자신의 IP주소를 유레카에 등록
    fetch-registry: true        # 유레카에 등록된 주소들을 받아오는 것


spring:
  application:
    name: board-query

  datasource:
    river-class-name: org.mariadb.jdbc.Driver
    url: ${SLAVE_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
